{% extends "base.html" %}
{% block title %}{{ form_title }} — StreamVip Admin{% endblock %}
{% block header_title %}{{ form_title }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="flex items-center gap-3 mb-6">
    <a href="/panel/accounts" class="text-slate-400 hover:text-white p-2 rounded-lg hover:bg-slate-700/50 transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
      </svg>
    </a>
    <h2 class="text-xl font-bold text-white">{{ form_title }}</h2>
  </div>

  <div class="bg-slate-800/60 border border-slate-700/50 rounded-2xl p-6">
    <form action="{{ form_action }}" method="POST" class="space-y-5">

      <div>
        <label class="form-label">Plataforma *</label>
        <select name="platform_id" required class="form-input">
          <option value="">Selecciona una plataforma...</option>
          {% for p in platforms %}
          <option value="{{ p['id'] }}" {% if account and account.get('platform_id') == p['id'] %}selected{% endif %}>
            {{ p.get('icon_emoji','') }} {{ p['name'] }}
          </option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label class="form-label">Email de la cuenta *</label>
        <input type="email" name="email" required
          value="{{ account.get('email','') if account else '' }}"
          placeholder="cuenta@ejemplo.com"
          class="form-input" />
      </div>

      <div>
        <label class="form-label">Contraseña *</label>
        <input type="text" name="password" required
          value="{{ account.get('password','') if account else '' }}"
          placeholder="Contraseña de la cuenta"
          class="form-input font-mono" />
      </div>

      <div>
        <label class="form-label">Fecha de Facturación</label>
        <input type="date" name="billing_date"
          value="{{ account.get('billing_date','') if account else '' }}"
          class="form-input" />
        <p class="text-xs text-slate-500 mt-1">Fecha en que se renueva la suscripción de la cuenta</p>
      </div>

      {% if account %}
      <div>
        <label class="form-label">Estado</label>
        <select name="status" class="form-input">
          <option value="active" {% if account.get('status') == 'active' %}selected{% endif %}>Activa</option>
          <option value="suspended" {% if account.get('status') == 'suspended' %}selected{% endif %}>Suspendida</option>
          <option value="inactive" {% if account.get('status') == 'inactive' %}selected{% endif %}>Inactiva</option>
        </select>
      </div>
      {% endif %}

      <div>
        <label class="form-label">Notas internas</label>
        <textarea name="notes" rows="3"
          placeholder="Notas sobre esta cuenta (opcional)..."
          class="form-input resize-none">{{ account.get('notes','') if account else '' }}</textarea>
      </div>

      <div class="flex gap-3 pt-2">
        <a href="/panel/accounts" class="btn-secondary flex-1 justify-center">Cancelar</a>
        <button type="submit" class="btn-primary flex-1 justify-center">
          {% if account %}💾 Guardar cambios{% else %}✅ Crear cuenta{% endif %}
        </button>
      </div>

    </form>
  </div>
</div>
{% endblock %}
